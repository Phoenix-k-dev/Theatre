backend:
  name: git-gateway
  branch: main

# Dossier où sont stockées les images/PDF téléversés depuis l'admin
media_folder: "src/assets/img/uploads"
public_folder: "/assets/img/uploads"

publish_mode: simple

collections:
  - name: "spectacles"
    label: "Spectacles"
    label_singular: "Spectacle"
    folder: "src/spectacles"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Ordre d'affichage dans le menu", name: "order", widget: "number", default: 1, hint: "1 = premier de la liste" }
      - { label: "Accroche (résumé affiché sur la page d'accueil)", name: "accroche", widget: "text" }
      - { label: "Fiche technique", name: "facts", widget: "text", hint: "Une information par ligne (public, durée, création...)" }
      - { label: "Photo du spectacle", name: "photo", widget: "image", required: false }
      - label: "Position de la photo"
        name: "photo_position"
        widget: "select"
        options: ["droite", "gauche"]
        default: "droite"
        required: false
      - label: "Format de la photo"
        name: "photo_ratio"
        widget: "select"
        options:
          - { label: "Paysage (large)", value: "paysage" }
          - { label: "Portrait (haut)", value: "portrait" }
          - { label: "Carré", value: "carre" }
          - { label: "Ajusté à la hauteur du texte", value: "ajuste" }
        default: "portrait"
        required: false
      - { label: "Crédits (mise en scène, regard complice...)", name: "credits", widget: "text", required: false, hint: "Une ligne par information" }
      - label: "Mise en page"
        name: "mise_en_page"
        widget: "select"
        options:
          - { label: "Standard (photo et texte côte à côte)", value: "standard" }
          - { label: "Fiche (petite photo à côté de la fiche technique, texte en dessous)", value: "fiche" }
          - { label: "Fiche double (2 photos, synopsis + note d'intention + texte)", value: "fiche-double" }
        default: "standard"
        required: false
      - { label: "Synopsis (à côté de la 1ère photo — variante fiche double)", name: "synopsis", widget: "text", required: false }
      - { label: "Note d'intention (centrée, en dessous — variante fiche double)", name: "note_intention", widget: "text", required: false }
      - { label: "Deuxième photo (variante fiche double)", name: "photo2", widget: "image", required: false }
      - label: "Format de la deuxième photo"
        name: "photo2_ratio"
        widget: "select"
        options:
          - { label: "Paysage (large)", value: "paysage" }
          - { label: "Portrait (haut)", value: "portrait" }
          - { label: "Carré", value: "carre" }
          - { label: "Ajusté à la hauteur du texte", value: "ajuste" }
        default: "ajuste"
        required: false
      - { label: "Affiche (image pleine largeur, en bas de page)", name: "affiche", widget: "image", required: false }
      - { label: "Image supplémentaire (tout en bas, après la vidéo)", name: "image_bas", widget: "image", required: false }
      - { label: "Lien vidéo YouTube", name: "video", widget: "string", required: false, hint: "Colle simplement le lien de la vidéo YouTube (ex: https://youtu.be/xxxx)" }
      - { label: "Dossier de diffusion (PDF)", name: "dossier", widget: "file", required: false }
      - { label: "Revue de presse (PDF)", name: "revue_presse", widget: "file", required: false }
      - { label: "Texte de présentation", name: "body", widget: "markdown" }

  - name: "dates"
    label: "Dates de spectacle (Agenda)"
    label_singular: "Date"
    folder: "src/dates"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: spectacle
    fields:
      - label: "Spectacle"
        name: "spectacle"
        widget: "relation"
        collection: "spectacles"
        search_fields: ["title"]
        display_fields: ["title"]
        value_field: "title"
        hint: "Choisis le spectacle concerné par cette date"
      - { label: "Date de début", name: "date_debut", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Date de fin (si plusieurs jours, sinon laisser vide)", name: "date_fin", widget: "date", format: "YYYY-MM-DD", required: false, hint: "Laisse vide si le spectacle ne dure qu'un seul jour" }
      - { label: "Heure", name: "heure", widget: "string", required: false, hint: "Ex: 19h00" }
      - { label: "Lieu", name: "lieu", widget: "string" }
      - { label: "Ville", name: "ville", widget: "string", required: false }
      - { label: "Lien billetterie", name: "lien_billetterie", widget: "string", required: false }

  - name: "archives"
    label: "Archives (dates passées, avant l'agenda en ligne)"
    files:
      - file: "src/_data/archives.json"
        label: "Archives par année"
        name: "archives"
        fields:
          - label: "Années"
            name: "archives"
            widget: "list"
            fields:
              - { label: "Année", name: "annee", widget: "string" }
              - { label: "Contenu (une ligne par date)", name: "contenu", widget: "text" }

  - name: "reglages"
    label: "Réglages du site"
    files:
      - file: "src/_data/site.json"
        label: "Contenu général"
        name: "site"
        fields:
          - { label: "Titre du site", name: "titre", widget: "string" }
          - { label: "Accroche sous le titre", name: "tagline", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image", required: false }
          - label: "Style de police"
            name: "police"
            widget: "select"
            options:
              - { label: "Élégant et fin (Jost / Cormorant)", value: "elegant" }
              - { label: "Doux et arrondi (Quicksand)", value: "doux" }
              - { label: "Classique (Playfair / Baskerville)", value: "classique" }
            default: "elegant"
          - { label: "Photo mise en avant sur l'accueil", name: "photo_accueil", widget: "image", required: false }
          - { label: "Texte de la citation", name: "citation_texte", widget: "text" }
          - { label: "Auteur de la citation", name: "citation_auteur", widget: "string" }
          - { label: "Texte de la section Agenda", name: "agenda_texte", widget: "text" }
          - { label: "Lien Facebook", name: "facebook_url", widget: "string" }
          - { label: "Lien YouTube", name: "youtube_url", widget: "string" }
          - { label: "Email de contact (lien mailto)", name: "contact_email", widget: "string" }
          - { label: "Nom (contact diffusion)", name: "contact_nom_diffusion", widget: "string" }
          - { label: "Rôle (contact diffusion)", name: "contact_role_diffusion", widget: "string" }
          - { label: "Email (contact diffusion)", name: "contact_email_diffusion", widget: "string" }
          - { label: "Téléphone (contact diffusion)", name: "contact_tel_diffusion", widget: "string" }
          - { label: "Adresse de la compagnie", name: "contact_adresse", widget: "string" }
          - { label: "Téléphone général", name: "contact_tel", widget: "string" }
          - { label: "Email général", name: "contact_email_general", widget: "string" }
          - { label: "Texte de présentation de la compagnie", name: "compagnie_histoire", widget: "text" }
          - label: "Équipe de la compagnie"
            name: "compagnie_equipe"
            widget: "list"
            fields:
              - { label: "Nom", name: "nom", widget: "string" }
              - { label: "Rôle", name: "role", widget: "string" }
          - label: "Liste des Amis des chiffons et d'ailleurs"
            name: "amis_liste"
            widget: "list"
            fields:
              - { label: "Nom", name: "nom", widget: "string" }
              - { label: "Rôle / spécialité", name: "role", widget: "string" }
